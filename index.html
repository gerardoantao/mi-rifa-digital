<!DOCTYPE html>

    <title>Sistema de Rifa Digital Inteligente</title>
    <style>
        :root {
            --vacante: #e2e8f0;
            --ocupado: #e74c3c;
            --seleccionado: #2ecc71;
            --texto-oscuro: #2c3e50;
        }
        body { font-family: Arial, sans-serif; background-color: #f8fafc; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: var(--texto-oscuro); margin-bottom: 5px; }
        .referencias { display: flex; justify-content: center; gap: 20px; margin: 20px 0; font-size: 14px; }
        .ref { display: flex; align-items: center; gap: 5px; }
        .cuadrito { width: 18px; height: 18px; border-radius: 4px; }
        
        /* Tablero directo */
        .grid-tablero { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; margin: 20px 0; }
        .btn-numero { padding: 15px 0; font-weight: bold; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; background-color: var(--vacante); color: var(--texto-oscuro); }
        .btn-numero.ocupado { background-color: var(--ocupado); color: white; cursor: not-allowed; }
        .btn-numero.seleccionado { background-color: var(--seleccionado); color: white; }

        /* Menú Desplegable */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; max-width: 400px; width: 90%; text-align: left; }
        .modal-content h3 { margin-top: 0; color: var(--texto-oscuro); }
        .opcion-precio { display: block; padding: 12px; margin: 10px 0; border: 2px solid #cbd5e1; border-radius: 8px; cursor: pointer; }
        .opcion-precio input { margin-right: 10px; }
        .opcion-precio span { display: block; font-size: 12px; color: #64748b; margin-top: 4px; }
        
        .btn-enviar { display: block; width: 100%; background-color: #25d366; color: white; text-align: center; padding: 12px; margin-top: 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-cerrar { background: #94a3b8; color: white; width: 100%; padding: 8px; border: none; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    </style>
</head>

<div class="modal" id="modalPrecios">
    <div class="modal-content">
        <h3>Configurá tu número: <span id="numElegido" style="color: var(--seleccionado)">00</span></h3>
        
        <label class="opcion-precio">
            <input type="radio" name="categoria" value="Economica" data-precio="2000" data-premio="100.000" checked>
            <strong>Económica: $2.000</strong>
            <span>Premio: $100.000 en efectivo.</span>
        </label>

        <label class="opcion-precio">
            <input type="radio" name="categoria" value="Estandar" data-precio="5000" data-premio="300.000">
            <strong>Estándar: $5.000</strong>
            <span>Premio: $300.000 en efectivo.</span>
        </label>

        <label class="opcion-precio">
            <input type="radio" name="categoria" value="Premium" data-precio="10000" data-premio="800.000">
            <strong>Premium: $10.000</strong>
            <span>Premio mayor de $800.000 o Celular.</span>
        </label>

        <button class="btn-enviar" id="btnConfirmar">Reservar por WhatsApp</button>
        <button class="btn-cerrar" onclick="cerrarMenu()">Cancelar</button>
    </div>
</div>

<script>
    // PONÉ TU NÚMERO ACÁ ADENTRO
    const tuTelefono = "5491151129751"; 
    
    let numeroActual = null;
    const modal = document.getElementById('modalPrecios');
    const numElegidoSpan = document.getElementById('numElegido');

    function abrirMenu(num) {
        numeroActual = num;
        numElegidoSpan.innerText = num;
        modal.style.display = "flex";
    }

    function cerrarMenu() {
        modal.style.display = "none";
    }

    document.getElementById('btnConfirmar').addEventListener('click', () => {
        const seleccionada = document.querySelector('input[name="categoria"]:checked');
        const categoria = seleccionada.value;
        const precio = seleccionada.getAttribute('data-precio');
        const premio = seleccionada.getAttribute('data-premio');

        let textoMsg = `¡Hola! Quiero reservar el número *${numeroActual}*.\n\n` +
                       `• Categoría: *${categoria}*\n` +
                       `• Valor a transferir: *$${precio}*\n` +
                       `• Premio asignado: *$${premio}*\n\n` +
                       `Pasame el alias para depositar.`;

       window.location.href = `https://wa.me/${tuTelefono}?text=${encodeURIComponent(textoMsg)}`;
        modal.style.display = "none";
    });
</script>
